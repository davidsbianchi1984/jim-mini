<svg role="img" aria-labelledby="t d" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" font-family="Helvetica, Arial, sans-serif">
  <title id="t">JIM-mini / Guardian — personal guidance for known conditions</title>
  <desc id="d">JIM-mini / Guardian — personal guidance for known conditions. Hand-built vector illustration from the QRME product family design system.</desc>
  <defs>
    <linearGradient id="jbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1030"/>
      <stop offset="0.5" stop-color="#171A46"/>
      <stop offset="1" stop-color="#242766"/>
    </linearGradient>
    <radialGradient id="jvign" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0.62" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#090A26" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="jhalo" cx="0.5" cy="0.46" r="0.6">
      <stop offset="0" stop-color="#BFEAC8" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#7BC47F" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#7BC47F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="jshield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#454890"/>
      <stop offset="1" stop-color="#20224F"/>
    </linearGradient>
    <linearGradient id="jperson" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3E4187"/>
      <stop offset="1" stop-color="#1E2050"/>
    </linearGradient>
    <filter id="jsoft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="jsoft2" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="jshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#05061C" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#jbg)"/>
  <ellipse cx="800" cy="300" rx="480" ry="330" fill="url(#jhalo)"/>

  <!-- constellation -->
  <g fill="#C9CDD8" opacity="0.5">
    <circle cx="110" cy="80" r="1.6"/><circle cx="300" cy="55" r="1.2"/><circle cx="520" cy="90" r="1.4"/>
    <circle cx="1000" cy="60" r="1.4"/><circle cx="1180" cy="110" r="1.6"/><circle cx="1230" cy="330" r="1.2"/>
    <circle cx="70" cy="420" r="1.4"/><circle cx="180" cy="560" r="1.2"/><circle cx="1150" cy="540" r="1.4"/>
  </g>

  <!-- long ECG baseline crossing the whole cover -->
  <g>
    <path d="M40 470 L560 470 L588 470 L604 430 L622 512 L640 448 L654 470 L1240 470"
          fill="none" stroke="#7BC47F" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.85"/>
    <path d="M40 470 L560 470 L588 470 L604 430 L622 512 L640 448 L654 470 L1240 470"
          fill="none" stroke="#7BC47F" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.18" filter="url(#jsoft2)"/>
    <circle cx="654" cy="470" r="5" fill="#BFEAC8"/>
  </g>

  <!-- ===== guardian shield ===== -->
  <g transform="translate(800 290)">
    <g filter="url(#jsoft)"><path d="M0 -168 L118 -120 V8 C118 96 62 152 0 180 C-62 152 -118 96 -118 8 V-120 Z" fill="#7BC47F" opacity="0.30"/></g>
    <path d="M0 -156 L106 -112 V6 C106 88 56 140 0 166 C-56 140 -106 88 -106 6 V-112 Z"
          fill="url(#jshield)" stroke="#7BC47F" stroke-width="3" filter="url(#jshadow)"/>
    <path d="M0 -134 L84 -98 V4 C84 74 44 118 0 140 C-44 118 -84 74 -84 4 V-98 Z"
          fill="none" stroke="#BFEAC8" stroke-opacity="0.25" stroke-width="1.2" stroke-dasharray="3 8"/>
    <!-- heart + pulse inside -->
    <path d="M0 34 C-8 18 -34 8 -34 -14 C-34 -30 -20 -38 -8 -32 C-3 -30 -1 -27 0 -24 C1 -27 3 -30 8 -32 C20 -38 34 -30 34 -14 C34 8 8 18 0 34 Z"
          fill="#E8A34D" opacity="0.95"/>
    <path d="M-58 62 L-24 62 L-14 40 L-2 88 L10 50 L18 62 L58 62"
          fill="none" stroke="#BFEAC8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- orbit sensors -->
    <circle r="196" fill="none" stroke="#7BC47F" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="2 10"/>
    <g fill="#BFEAC8">
      <circle cx="0" cy="-196" r="4"/><circle cx="170" cy="98" r="3.4"/><circle cx="-170" cy="98" r="3.4"/>
    </g>
  </g>

  <!-- watched person, inside the shield's care (left of shield) -->
  <g transform="translate(560 430)">
    <circle cy="-26" r="22" fill="url(#jperson)" stroke="#7BC47F" stroke-opacity="0.6" stroke-width="1.6"/>
    <path d="M-36 66 C-36 12 -18 -6 0 -6 C18 -6 36 12 36 66 Z" fill="url(#jperson)"/>
    <!-- wearable glint -->
    <circle cx="30" cy="26" r="5" fill="#12143B" stroke="#E8A34D" stroke-width="1.6"/>
  </g>

  <!-- escalation beacon (right) -->
  <g transform="translate(1105 250)">
    <g filter="url(#jsoft2)"><circle r="16" fill="#D96A6A" opacity="0.5"/></g>
    <circle r="10" fill="#D96A6A"/>
    <circle r="22" fill="none" stroke="#D96A6A" stroke-opacity="0.45" stroke-width="1.4"/>
    <circle r="34" fill="none" stroke="#D96A6A" stroke-opacity="0.2" stroke-width="1.2"/>
    <text y="58" text-anchor="middle" font-size="12" fill="#D98A8A" letter-spacing="1">escalation</text>
  </g>
  <path d="M905 240 C980 228 1030 236 1068 246" fill="none" stroke="#D96A6A" stroke-width="1.8" stroke-opacity="0.55" stroke-dasharray="6 7" stroke-linecap="round"/>

  <!-- tandem node (top left of shield) -->
  <g transform="translate(1090 130)">
    <circle r="24" fill="none" stroke="#E8A34D" stroke-opacity="0.6" stroke-width="1.6"/>
    <circle cy="-6" r="8" fill="#F0C482"/>
    <path d="M-13 18 C-13 4 -7 0 0 0 C7 0 13 4 13 18 Z" fill="#F0C482"/>
    <text y="46" text-anchor="middle" font-size="12" fill="#E8A34D" letter-spacing="1">QRME tandem</text>
  </g>
  <path d="M902 180 C960 160 1010 148 1058 138" fill="none" stroke="#E8A34D" stroke-width="1.8" stroke-opacity="0.6" stroke-dasharray="2 7" stroke-linecap="round"/>

  <!-- wordmark -->
  <g transform="translate(72 110)">
    <text font-size="56" font-weight="bold" letter-spacing="4" fill="#F4E3C8">JIM-mini</text>
    <text y="32" font-size="17" fill="#C9CDD8" opacity="0.92">Guardian — personal guidance for known conditions</text>
    <text y="58" font-size="13.5" fill="#8B90A8">monitor · predict · guide · escalate — on every device</text>
    <rect x="2" y="74" width="64" height="3" rx="1.5" fill="#7BC47F"/>
  </g>

  <!-- embodiment row: watch · console · robot · phone, riding the ECG line -->
  <g transform="translate(96 560)" opacity="0.95">
    <g transform="translate(0 0)">
      <rect x="-13" y="-18" width="26" height="36" rx="9" fill="#20224F" stroke="#7BC47F" stroke-width="1.4"/>
      <path d="M-6 0 L-2 0 L0 -5 L2 5 L4 0 L6 0" fill="none" stroke="#7BC47F" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <g transform="translate(64 0)">
      <rect x="-20" y="-15" width="40" height="27" rx="4" fill="#20224F" stroke="#9FD8E8" stroke-opacity="0.7" stroke-width="1.4"/>
      <rect x="-9" y="12" width="18" height="4" rx="2" fill="#2A2C63"/>
      <text y="-20" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#E8A34D">LLM</text>
    </g>
    <g transform="translate(128 0)">
      <rect x="-14" y="-14" width="28" height="24" rx="8" fill="#20224F" stroke="#C9CDD8" stroke-opacity="0.6" stroke-width="1.4"/>
      <circle cx="-5" cy="-4" r="2.6" fill="#9FD8E8"/><circle cx="5" cy="-4" r="2.6" fill="#9FD8E8"/>
      <rect x="-5" y="3" width="10" height="2.6" rx="1.3" fill="#7BC47F"/>
      <circle cx="0" cy="-19" r="2.4" fill="#E8A34D"/>
    </g>
    <g transform="translate(186 0)">
      <rect x="-9" y="-17" width="18" height="34" rx="5" fill="#20224F" stroke="#C9CDD8" stroke-opacity="0.5" stroke-width="1.2"/>
      <rect x="-5" y="6" width="10" height="5" rx="2.5" fill="#E8A34D" opacity="0.9"/>
    </g>
    <path d="M-20 30 H206" stroke="#5FA8C0" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3 6"/>
    <text x="93" y="44" text-anchor="middle" font-size="10.5" fill="#8B90A8">one remembered thread across embodiments</text>
  </g>

  <!-- PDI vault node (bottom right) -->
  <g transform="translate(1130 400)">
    <circle r="22" fill="#1B1D4E" stroke="#9FD8E8" stroke-opacity="0.7" stroke-width="1.6"/>
    <circle r="14" fill="none" stroke="#DDE1EC" stroke-opacity="0.6" stroke-width="2.4"/>
    <g stroke="#DDE1EC" stroke-opacity="0.65" stroke-width="2.2" stroke-linecap="round">
      <line y1="-10" y2="10"/><line x1="-10" x2="10"/>
    </g>
    <circle r="5" fill="#12143B" stroke="#E8A34D" stroke-width="1.4"/>
    <text y="42" text-anchor="middle" font-size="12" fill="#9FD8E8" letter-spacing="1">PDI vault</text>
  </g>
  <path d="M902 320 C980 348 1040 372 1100 390" fill="none" stroke="#9FD8E8" stroke-width="1.6" stroke-opacity="0.5" stroke-dasharray="2 7" stroke-linecap="round"/>

  <rect width="1280" height="640" fill="url(#jvign)"/>
</svg>
