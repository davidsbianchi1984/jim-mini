<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 700" width="1300" height="700" font-family="Helvetica, Arial, sans-serif">
  <title>JIM-mini physical embodiments — one remembered thread across wearable, stationary, and autonomous devices</title>
  <defs>
    <linearGradient id="zbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1136"/>
      <stop offset="0.5" stop-color="#1B1D4E"/>
      <stop offset="1" stop-color="#141639"/>
    </linearGradient>
    <radialGradient id="zvign" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0.64" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#090A26" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="zshield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#454890"/>
      <stop offset="1" stop-color="#20224F"/>
    </linearGradient>
    <linearGradient id="zdev" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33367C"/>
      <stop offset="1" stop-color="#1C1E4B"/>
    </linearGradient>
    <filter id="zshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#05061C" flood-opacity="0.55"/>
    </filter>
    <filter id="zsoft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>

  <rect width="1300" height="700" fill="url(#zbg)"/>

  <text x="650" y="56" text-anchor="middle" font-size="28" font-weight="bold" fill="#F4E3C8" letter-spacing="1.5">One remembered thread, every embodiment</text>
  <text x="650" y="84" text-anchor="middle" font-size="15" fill="#8B90A8">Wearables, stationary systems, and networked autonomous devices — sessions resume anywhere</text>

  <!-- continuity ring -->
  <circle cx="650" cy="390" r="252" fill="none" stroke="#E8A34D" stroke-opacity="0.3" stroke-width="1.6" stroke-dasharray="2 10" stroke-linecap="round"/>
  <text x="650" y="666" text-anchor="middle" font-size="12.5" fill="#E8A34D" opacity="0.85" letter-spacing="1">the session thread — memory, personality, and known conditions follow the user</text>

  <!-- ===== guardian core ===== -->
  <g transform="translate(650 390)">
    <g filter="url(#zsoft)"><circle r="88" fill="#7BC47F" opacity="0.3"/></g>
    <circle r="80" fill="url(#zshield)" stroke="#7BC47F" stroke-width="2.4" filter="url(#zshadow)"/>
    <path d="M-36 4 L-14 4 L-7 -14 L2 24 L9 -4 L14 4 L36 4" fill="none" stroke="#BFEAC8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="#F4E3C8">JIM-mini</text>
    <text y="57" text-anchor="middle" font-size="10" fill="#8B90A8">guardian + life coach</text>
  </g>

  <!-- ===== wearable (top-left): bluetooth-linked watch ===== -->
  <g transform="translate(340 210)" filter="url(#zshadow)">
    <rect x="-58" y="-70" width="116" height="140" rx="30" fill="url(#zdev)"/>
    <rect x="-40" y="-46" width="80" height="92" rx="18" fill="#12143B" stroke="#7BC47F" stroke-width="1.6"/>
    <path d="M-22 0 L-8 0 L-3 -12 L4 16 L9 -3 L13 0 L24 0" fill="none" stroke="#7BC47F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-16" y="-88" width="32" height="14" rx="6" fill="#2A2C63"/>
    <rect x="-16" y="74" width="32" height="14" rx="6" fill="#2A2C63"/>
    <!-- bluetooth glyph -->
    <g transform="translate(46 -58)">
      <circle r="12" fill="#12143B" stroke="#5FA8C0" stroke-width="1.4"/>
      <path d="M-3 -5 L3 0 L-3 5 M0 -7 V7 M0 -7 L3 -4 M0 7 L3 4" stroke="#9FD8E8" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    </g>
  </g>
  <text x="340" y="330" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#C9CDD8">wearable</text>
  <text x="340" y="349" text-anchor="middle" font-size="11.5" fill="#8B90A8">smart watch · Bluetooth, relays via phone</text>

  <!-- ===== stationary (top-right): console with on-device LLM ===== -->
  <g transform="translate(960 210)" filter="url(#zshadow)">
    <rect x="-85" y="-62" width="170" height="112" rx="14" fill="url(#zdev)"/>
    <rect x="-71" y="-48" width="142" height="84" rx="8" fill="#12143B" stroke="#9FD8E8" stroke-opacity="0.5" stroke-width="1.4"/>
    <g fill="#8B90A8"><rect x="-58" y="-32" width="80" height="5" rx="2.5"/><rect x="-58" y="-19" width="112" height="5" rx="2.5"/><rect x="-58" y="-6" width="96" height="5" rx="2.5"/></g>
    <rect x="-58" y="10" width="56" height="16" rx="8" fill="#E8A34D"/>
    <rect x="-24" y="50" width="48" height="10" rx="5" fill="#2A2C63"/>
    <rect x="-42" y="60" width="84" height="8" rx="4" fill="#2A2C63"/>
    <!-- on-device LLM badge -->
    <g transform="translate(66 -44)">
      <circle r="15" fill="#23255C" stroke="#E8A34D" stroke-width="1.6"/>
      <text y="4" text-anchor="middle" font-size="9" font-weight="bold" fill="#E8A34D">LLM</text>
    </g>
  </g>
  <text x="960" y="330" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#C9CDD8">stationary system</text>
  <text x="960" y="349" text-anchor="middle" font-size="11.5" fill="#8B90A8">kitchen console · Wi-Fi · answers with its own LLM</text>

  <!-- ===== autonomous (bottom): helper robot ===== -->
  <g transform="translate(650 592)" filter="url(#zshadow)">
    <g transform="translate(-230 -40)">
      <rect x="-46" y="-34" width="92" height="72" rx="20" fill="url(#zdev)"/>
      <circle cx="-16" cy="-6" r="8" fill="#9FD8E8"/>
      <circle cx="16" cy="-6" r="8" fill="#9FD8E8"/>
      <rect x="-16" y="14" width="32" height="6" rx="3" fill="#7BC47F"/>
      <rect x="-6" y="-52" width="12" height="14" rx="5" fill="#2A2C63"/>
      <circle cx="0" cy="-56" r="5" fill="#E8A34D"/>
      <!-- LLM badge -->
      <g transform="translate(38 -30)">
        <circle r="13" fill="#23255C" stroke="#E8A34D" stroke-width="1.4"/>
        <text y="3.5" text-anchor="middle" font-size="8" font-weight="bold" fill="#E8A34D">LLM</text>
      </g>
      <text y="62" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#C9CDD8">autonomous device</text>
      <text y="80" text-anchor="middle" font-size="11.5" fill="#8B90A8">helper robot · networked, first-aid capable</text>
    </g>
    <!-- phone (linked relay) -->
    <g transform="translate(230 -44)">
      <rect x="-34" y="-58" width="68" height="116" rx="14" fill="url(#zdev)"/>
      <rect x="-26" y="-48" width="52" height="96" rx="8" fill="#12143B" stroke="#C9CDD8" stroke-opacity="0.4" stroke-width="1.2"/>
      <g fill="#8B90A8"><rect x="-16" y="-32" width="32" height="4" rx="2"/><rect x="-16" y="-22" width="24" height="4" rx="2"/></g>
      <rect x="-16" y="-6" width="32" height="22" rx="8" fill="#E8A34D" opacity="0.9"/>
      <text y="66" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#C9CDD8">linked device</text>
      <text y="84" text-anchor="middle" font-size="11.5" fill="#8B90A8">phone · session login, coach chat</text>
    </g>
  </g>

  <!-- links to core -->
  <g fill="none" stroke-linecap="round">
    <path d="M420 268 C500 310 540 336 578 358" stroke="#5FA8C0" stroke-width="2" stroke-opacity="0.6" stroke-dasharray="1 7"/>
    <path d="M878 268 C800 310 760 336 722 358" stroke="#9FD8E8" stroke-width="2" stroke-opacity="0.55"/>
    <path d="M448 550 C520 512 560 480 594 452" stroke="#7BC47F" stroke-width="2" stroke-opacity="0.55"/>
    <path d="M852 550 C780 512 740 480 706 452" stroke="#E8A34D" stroke-width="2" stroke-opacity="0.55"/>
  </g>
  <!-- bluetooth relay between watch and phone -->
  <path d="M418 244 C640 300 760 420 856 512" stroke="#5FA8C0" stroke-width="1.4" stroke-opacity="0.35" stroke-dasharray="4 8" fill="none" stroke-linecap="round"/>

  <!-- session chips -->
  <g font-size="10.5" text-anchor="middle" filter="url(#zshadow)">
    <g transform="translate(497 320)">
      <rect x="-52" y="-13" width="104" height="24" rx="12" fill="#12143B" stroke="#3A3D7E" stroke-width="1.2"/>
      <text y="3" fill="#C9CDD8">session · watch</text>
    </g>
    <g transform="translate(803 320)">
      <rect x="-56" y="-13" width="112" height="24" rx="12" fill="#12143B" stroke="#3A3D7E" stroke-width="1.2"/>
      <text y="3" fill="#C9CDD8">session · console</text>
    </g>
  </g>

  <rect width="1300" height="700" fill="url(#zvign)"/>
</svg>
